plugins {
    id 'com.android.application'
}

android {
    namespace 'com.editingvideo.app'
    compileSdk 35

    defaultConfig {
        applicationId "com.editingvideo.app"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'

    // Memaksa versi library turunan Kotlin ke 1.8.22 
    // agar selaras dan menghindari error "Duplicate class"
    constraints {
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22")
        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22")
    }
}
